<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Todo List</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Open+Sans:wght@400;600&display=swap');

:root {
  --font-primary: 'Roboto', sans-serif;
  --font-secondary: 'Open Sans', sans-serif;
  --color-bg: #1e1e2f;
  --color-text: #e0e0f1;
  --color-accent: #ff4081;
  --color-card-bg: #27293d;
  --color-footer-bg: #141426;
  --color-hover-bg: #39395c;
  --spacing-small: 8px;
  --spacing-medium: 16px;
  --spacing-large: 24px;
  --transition-speed: 0.3s;
}

body {
  font-family: var(--font-primary);
  background-color: var(--color-bg);
  color: var(--color-text);
  margin: 0;
  padding: 0;
}

.navbar {
  display: flex;
  justify-content: space-between;
  padding: var(--spacing-medium);
  background-color: var(--color-card-bg);
}

.hero {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--spacing-large) var(--spacing-medium);
  background: var(--hero-bg);
  color: var(--color-text);
  text-align: center;
  font-family: var(--font-secondary);
}

.btn-primary,
.btn-secondary {
  padding: var(--spacing-small) var(--spacing-medium);
  border: none;
  cursor: pointer;
  transition: background-color var(--transition-speed);
  font-family: var(--font-secondary);
}

.btn-primary {
  background-color: var(--color-accent);
  color: #ffffff;
}

.btn-primary:hover {
  background-color: #e03674;
}

.btn-secondary {
  background-color: var(--color-card-bg);
  color: var(--color-text);
}

.btn-secondary:hover {
  background-color: var(--color-hover-bg);
}

.card {
  background-color: var(--color-card-bg);
  padding: var(--spacing-medium);
  border-radius: 8px;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
}

.footer {
  background-color: var(--color-footer-bg);
  padding: var(--spacing-medium);
  text-align: center;
  font-family: var(--font-secondary);
}

.footer a {
  color: var(--color-accent);
  text-decoration: none;
  transition: color var(--transition-speed);
}

.footer a:hover {
  color: #e03674;
}
</style>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0d0d0d; color: #e0e0e0; min-height: 100vh; }
        .container { max-width: 600px; margin: 0 auto; padding: 0 20px; }
        .app-wrapper { padding: 40px 0; }
        .todo-container { background: #1a1a1a; border-radius: 16px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
        h1 { text-align: center; margin-bottom: 30px; font-size: 2rem; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .input-group { display: flex; gap: 12px; margin-bottom: 24px; }
        .input-group input { flex: 1; padding: 14px 18px; border: 2px solid #333; border-radius: 10px; background: #252525; color: #fff; font-size: 1rem; transition: border-color 0.3s; }
        .input-group input:focus { outline: none; border-color: #667eea; }
        .input-group input::placeholder { color: #666; }
        .add-btn { padding: 14px 24px; background: linear-gradient(135deg, #667eea, #764ba2); border: none; border-radius: 10px; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        .add-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
        .filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-btn { padding: 8px 16px; background: #252525; border: 2px solid #333; border-radius: 8px; color: #888; font-size: 0.9rem; cursor: pointer; transition: all 0.3s; }
        .filter-btn:hover, .filter-btn.active { border-color: #667eea; color: #fff; background: #2a2a2a; }
        .todo-list { list-style: none; }
        .todo-item { display: flex; align-items: center; gap: 14px; padding: 16px; background: #252525; border-radius: 10px; margin-bottom: 10px; transition: transform 0.2s, background 0.2s; }
        .todo-item:hover { background: #2a2a2a; }
        .todo-item.completed .todo-text { text-decoration: line-through; color: #555; }
        .checkbox { width: 22px; height: 22px; border: 2px solid #444; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; flex-shrink: 0; }
        .checkbox:hover { border-color: #667eea; }
        .todo-item.completed .checkbox { background: linear-gradient(135deg, #667eea, #764ba2); border-color: transparent; }
        .checkbox::after { content: '✓'; color: #fff; font-size: 12px; opacity: 0; }
        .todo-item.completed .checkbox::after { opacity: 1; }
        .todo-text { flex: 1; font-size: 1rem; word-break: break-word; }
        .delete-btn { width: 32px; height: 32px; background: transparent; border: none; color: #555; font-size: 1.2rem; cursor: pointer; border-radius: 6px; transition: all 0.3s; display: flex; align-items: center; justify-content: center; }
        .delete-btn:hover { background: #3a2a2a; color: #e74c3c; }
        .stats { display: flex; justify-content: space-between; align-items: center; padding-top: 20px; border-top: 1px solid #333; margin-top: 20px; }
        .stats span { color: #666; font-size: 0.9rem; }
        .clear-btn { padding: 8px 16px; background: transparent; border: 1px solid #444; border-radius: 6px; color: #888; font-size: 0.85rem; cursor: pointer; transition: all 0.3s; }
        .clear-btn:hover { border-color: #e74c3c; color: #e74c3c; }
        .empty-state { text-align: center; padding: 40px; color: #555; }
        .empty-state span { font-size: 3rem; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <img src="https://img.recraft.ai/IGPbW11U0nTBqBfPn2EDtJ3rhZ2noFoArR0auCHRGto/rs:fit:1024:1024:0/raw:1/plain/abs://external/images/5112c46c-de79-4e5b-8629-c2aac93c7162" alt="Logo" class="navbar-logo" style="height:40px;width:auto;">
            <span style="font-weight: 600;">Dark Todo</span>
        </div>
    </nav>
    <div class="hero" style="background-image:url('https://replicate.delivery/xezq/20Fc2Jb3q8bJPBDfRqA4sRBzzwB7eObn8xFzZmFNrkxfbchsA/out-0.webp');background-size:cover;background-position:center;">
        <div class="container">
            <h2 style="font-size: 2.5rem; margin-bottom: 16px;">Organize Your Day</h2>
            <p style="font-size: 1.1rem; opacity: 0.9; margin-bottom: 24px;">A minimal, dark-themed todo list to keep you focused</p>
            <a href="#app" class="btn-primary">Get Started</a>
        </div>
    </div>
    <main class="app-wrapper" id="app">
        <div class="container">
            <div class="todo-container">
                <h1>✨ My Tasks</h1>
                <div class="input-group">
                    <input type="text" id="todoInput" placeholder="What needs to be done?" autocomplete="off">
                    <button class="add-btn" onclick="addTodo()">Add</button>
                </div>
                <div class="filters">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="active">Active</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
                <ul class="todo-list" id="todoList"></ul>
                <div class="stats" id="stats"></div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <p>Built with focus and simplicity in mind</p>
        </div>
    </footer>
    <script>
        let todos = JSON.parse(localStorage.getItem('darkTodos')) || [];
        let currentFilter = 'all';

        function saveTodos() {
            localStorage.setItem('darkTodos', JSON.stringify(todos));
        }

        function addTodo() {
            const input = document.getElementById('todoInput');
            const text = input.value.trim();
            if (!text) return;
            todos.push({ id: Date.now(), text, completed: false });
            input.value = '';
            saveTodos();
            renderTodos();
        }

        function toggleTodo(id) {
            todos = todos.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
            saveTodos();
            renderTodos();
        }

        function deleteTodo(id) {
            todos = todos.filter(t => t.id !== id);
            saveTodos();
            renderTodos();
        }

        function clearCompleted() {
            todos = todos.filter(t => !t.completed);
            saveTodos();
            renderTodos();
        }

        function getFilteredTodos() {
            if (currentFilter === 'active') return todos.filter(t => !t.completed);
            if (currentFilter === 'completed') return todos.filter(t => t.completed);
            return todos;
        }

        function renderTodos() {
            const list = document.getElementById('todoList');
            const filtered = getFilteredTodos();
            const activeCount = todos.filter(t => !t.completed).length;
            const completedCount = todos.filter(t => t.completed).length;

            if (todos.length === 0) {
                list.innerHTML = '<div class="empty-state"><span>📝</span>No tasks yet. Add one above!</div>';
            } else if (filtered.length === 0) {
                list.innerHTML = '<div class="empty-state"><span>🎯</span>No ' + currentFilter + ' tasks</div>';
            } else {
                list.innerHTML = filtered.map(todo => `
                    <li class="todo-item ${todo.completed ? 'completed' : ''}">
                        <div class="checkbox" onclick="toggleTodo(${todo.id})"></div>
                        <span class="todo-text">${escapeHtml(todo.text)}</span>
                        <button class="delete-btn" onclick="deleteTodo(${todo.id})">×</button>
                    </li>
                `).join('');
            }

            document.getElementById('stats').innerHTML = `
                <span>${activeCount} item${activeCount !== 1 ? 's' : ''} left</span>
                ${completedCount > 0 ? '<button class="clear-btn" onclick="clearCompleted()">Clear completed</button>' : ''}
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderTodos();
            });
        });

        document.getElementById('todoInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') addTodo();
        });

        renderTodos();
    </script>
</body>
</html>
